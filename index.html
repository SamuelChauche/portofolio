    <script>
      // Pre-paint flag so scroll-reveal can hide targets without a flash.
      // Skipped entirely under reduced-motion (content stays visible).
      try {
        if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          document.documentElement.classList.add('reveal-ready');
        }
      } catch (e) {}
    </script>
